<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            scroll-behavior: smooth;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;
        const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

        // --- Components ---

                <div className="w-16 h-1 bg-green-500 mx-auto mt-4 rounded-full"></div>
            </div>
        );

        const Hero = () => (
            <section className="relative h-screen min-h-[600px] flex items-center justify-center overflow-hidden">
                <div className="absolute inset-0 z-0">
                    <img 
                        src="https://picsum.photos/1920/1080?grayscale&blur=2" 
                        alt="Nature Tech Background" 
                        className="w-full h-full object-cover"
                    />
                    <div className="absolute inset-0 bg-gradient-to-b from-slate-900/80 to-slate-800/90 mix-blend-multiply"></div>
                </div>

                <div className="relative z-10 container mx-auto px-6 text-center text-white">
                    <motion.h1 
                        initial={{ y: 20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        transition={{ duration: 0.8 }}
                        className="text-6xl md:text-8xl lg:text-9xl font-black mb-8 tracking-tighter leading-none uppercase drop-shadow-2xl"
                    >
                        ELAD'S PORTFOLIO

                    <motion.div 
                        initial={{ scaleX: 0 }}
                        animate={{ scaleX: 1 }}
                        transition={{ delay: 0.5, duration: 0.8 }}
                        className="w-32 h-2 bg-green-500 mx-auto mb-10 rounded-full"
                    ></motion.div>
                    
                    <motion.div
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}

                </div>

        const InvestmentCard = ({ item }) => {
            const [isExpanded, setIsExpanded] = useState(false);

            return (

                                <h4 className="text-xl font-bold text-slate-800 mb-6">פילוסופיית ההשקעה שלי</h4>

                                    <div>
                                        <h5 className="font-bold text-slate-800">מדידות ודאטה</h5>

                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 flex-shrink-0">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                                    </div>
                                    <div>
                                        <h5 className="font-bold text-slate-800">טכנולוגיה עמוקה</h5>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

            }, []);

            return (
                <div className="bg-white p-6 rounded-xl shadow-lg border border-slate-100">

                            <h3 className="text-xl font-bold text-slate-800">דשבורד מעקב קרקע</h3>

                                </defs>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                <XAxis dataKey="name" tick={{fontSize: 12}} stroke="#94a3b8" />
                                <YAxis tick={{fontSize: 12}} stroke="#94a3b8" />

                                <Area type="monotone" dataKey="carbon" stroke="#10b981" fillOpacity={1} fill="url(#colorCarbon)" name="ספיחת פחמן (ק&quot;ג)" />

                            <span className="text-sm text-blue-600">פחמן הוסר החודש</span>
                        </div>
                    </div>

        const RegenerativeAg = () => (

                    <div className="grid lg:grid-cols-5 gap-10">
                        <div className="lg:col-span-2 space-y-6">

                            <div className="flex items-center space-x-3 space-x-reverse mb-6">

        const ChatBot = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([{ role: 'model', text: 'שלום! אני העוזר הווירטואלי של אלעד. איך אני יכול לעזור לך היום?' }]);
            const [input, setInput] = useState('');
            const messagesEndRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isOpen]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!input.trim()) return;
                setMessages(prev => [...prev, { role: 'user', text: input.trim() }]);
                setInput('');
                setTimeout(() => {
                    setMessages(prev => [...prev, { role: 'model', text: 'תודה על פנייתך! בגרסה זו הצ\'אט החי אינו זמין, אך ניתן ליצור קשר עם אלעד דרך הלינקים בתחתית העמוד.' }]);
                }, 1000);
            };

            return (
                <div className="fixed bottom-6 left-6 z-50 flex flex-col items-end">
                    {isOpen && (
                        <div className="bg-white w-80 md:w-96 rounded-2xl shadow-2xl mb-4 overflow-hidden border border-slate-200 flex flex-col max-h-[500px]">
                            <div className="bg-slate-900 p-4 flex justify-between items-center text-white">
                                <div className="flex items-center space-x-3 space-x-reverse">
                                    <div className="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-xs font-bold">AI</div>
                                    <span className="font-medium">הצ'אט של אלעד</span>
                                </div>
                                <button onClick={() => setIsOpen(false)} className="text-slate-300 hover:text-white">✕</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 bg-slate-50 space-y-4 min-h-[300px]">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                                        <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${msg.role === 'user' ? 'bg-slate-200 text-slate-800 rounded-br-none' : 'bg-green-600 text-white rounded-bl-none shadow-md'}`}>
                                            {msg.text}
                                        </div>
                                    </div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={handleSubmit} className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                <input type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder="שאל שאלה..." className="flex-1 px-4 py-2 bg-slate-100 rounded-full focus:outline-none focus:ring-2 focus:ring-green-500 text-sm" />
                                <button type="submit" className="p-2 bg-green-600 text-white rounded-full hover:bg-green-700">➤</button>
                            </form>
                        </div>
                    )}
                    <button onClick={() => setIsOpen(!isOpen)} className={`${isOpen ? 'hidden' : 'flex'} items-center justify-center w-14 h-14 bg-green-600 text-white rounded-full shadow-lg hover:bg-green-700 transition-all`}>
                        💬
                    </button>
                </div>
            );
        };

        const App = () => (
            <div className="min-h-screen flex flex-col font-sans" dir="rtl">
                <main className="flex-grow">
                    <Hero />
                    <Investments />
                    <RegenerativeAg />
                    <TechEngine />
                    <MusicCommunity />
                </main>
                <Footer />
                <ChatBot />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
